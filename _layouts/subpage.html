{% assign current_page = page.permalink | remove_first: "/" %}

<!DOCTYPE html>
<html lang="en">
    <head>
        {% include meta.html content = current_page %}
        {% include theme.html %}
        <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    </head>
    <body>
        <!-- FIX: This sometimes causes the page to go to "about:blank" -->
        {% include widgets/common/backarrow.html ref="javascript:history.back()" %}

        <main style="--navbar-height: 0;">
            {{ content | replace: '<table>', '<div class="table-container"><table>' | replace: '</table>', '</table></div>' }}
        </main>

        {% include widgets/footer.html %}
    </body>
</html>
