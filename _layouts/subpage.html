{% assign current_page = page.permalink | remove_first: "/" %}

<!DOCTYPE html>
<html lang="en">
    <head>
        {% include meta.html content = current_page %}
        <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
        <link rel="stylesheet" href="{{ "/assets/css/subpage.css" | relative_url }}">
    </head>
    <body>
        {% include backarrow.html %}

        <main style="--navbar-height: 0;">
            {{ content | replace: '<table>', '<div class="table-container"><table>' | replace: '</table>', '</table></div>' }}
        </main>

        {% include footer.html %}
    </body>
</html>
