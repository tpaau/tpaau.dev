<a class="card" href="{{ include.url }}">
    <h3>{{ include.title }}</h3>
    <p class="post-date">{{ include.date }}</p>
    <div class="card-img">
        <img src="{{ include.image }}" alt="{{ include.image-alt | default: 'The alt text is missing, please report this' }}">
    </div>
    <p>{{ include.summary }}</p>
</a>
