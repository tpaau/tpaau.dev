<meta charset="utf-8"/>

<title>{{ page.title }}</title>
{% if include.content == "404" %}
    <!-- The "robots" metadata disallowing page indexing is manually added to the 404 page since accessing it directly returns HTTP Status Code 200 -->
    <meta name="robots" content="noindex, nofollow">
{% endif %}
<meta name="description" content="{{ page.description }}">

<meta name="theme-color" content="#241f31">
<meta name="color-scheme" content="dark light">

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="fediverse:creator" content="@tpaau17db@mastodon.social">

<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tpaau.dev/{{ include.content }}">
<meta property="og:image" content="https://tpaau.dev/assets/icons/pfp-original-rounded.png">

<link rel="icon" type="image/png" href="/assets/icons/favicon-96x96.png" sizes="96x96">

<link rel="canonical" href="https://tpaau.dev/{{ include.content }}">

<link rel="icon" href="/assets/icons/favicon-32x32.png" sizes="32x32" type="image/png">
<link rel="icon" href="/assets/icons/favicon-16x16.png" sizes="16x16" type="image/png">
<link rel="manifest" href="/assets/manifest.webmanifest">
